<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{welcome.title}">Chào mừng đến với Todo App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header text-center">
                <h3 th:text="#{welcome.header}">Nhập tên chủ sở hữu của bạn</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/setOwner}" method="post">
                    <div class="mb-3">
                        <label class="form-label" th:text="#{owner.name.label}">Tên chủ sở hữu:</label>
                        <input type="text"
                               name="ownerName"
                               class="form-control"
                               required
                               placeholder="Ví dụ: Nguyễn Văn A">
                    </div>

                    <div class="d-grid">
                        <button type="submit"
                                class="btn btn-primary btn-lg"
                                th:text="#{btn.save}">Lưu</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger mt-3" role="alert">
            <span th:text="${error}"></span>
        </div>
    </div>
</div>

<div class="text-center mt-4">
    <a th:href="@{/welcome?lang=vi}" class="btn btn-outline-primary btn-sm"> Tiếng Việt</a>
    <a th:href="@{/welcome?lang=en}" class="btn btn-outline-secondary btn-sm"> English</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
