<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{app.title}">Personal Todo App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        .error { color: red; font-size: 0.9em; }
        .action-btn { font-size: 0.85rem; }
    </style>
</head>
<body class="container mt-5">

<!-- Header với tên chủ sở hữu -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 th:text="#{todo.list.title}">Quản Lý Công Việc Cá Nhân</h2>
    <h4>
        <span th:text="#{todo.list.of}">Danh sách của:</span>
        <strong th:text="${ownerName}"></strong>
    </h4>
</div>

<!-- Nút chuyển ngôn ngữ -->
<div class="mb-3">
    <a th:href="@{/todos?lang=vi}" class="btn btn-outline-primary btn-sm">🇻🇳 Tiếng Việt</a>
    <a th:href="@{/todos?lang=en}" class="btn btn-outline-secondary btn-sm">🇬🇧 English</a>
</div>

<!-- Thông báo Flash Message -->
<div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${message}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<!-- Form Thêm mới / Sửa -->
<div class="card mb-4">
    <div class="card-header" th:text="${todo.id != null} ? #{todo.form.edit} : #{todo.form.add}">
        Thêm / Sửa công việc
    </div>
    <div class="card-body">
        <form th:action="${todo.id != null} ? @{/update} : @{/add}"
              th:object="${todo}"
              method="post">

            <input type="hidden" th:field="*{id}" />

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" th:text="#{todo.content.label}">Nội dung công việc</label>
                    <input type="text" class="form-control" th:field="*{content}" placeholder="Nhập nội dung...">
                    <div class="error" th:errors="*{content}"></div>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label" th:text="#{todo.dueDate.label}">Ngày hết hạn</label>
                    <input type="date" class="form-control" th:field="*{dueDate}">
                    <div class="error" th:errors="*{dueDate}"></div>
                </div>

                <div class="col-md-2 mb-3">
                    <label class="form-label" th:text="#{todo.priority.label}">Độ ưu tiên</label>
                    <select class="form-select" th:field="*{priority}">
                        <option value="LOW" th:text="#{priority.low}">Thấp</option>
                        <option value="MEDIUM" th:text="#{priority.medium}" selected>Trung bình</option>
                        <option value="HIGH" th:text="#{priority.high}">Cao</option>
                    </select>
                </div>

                <div class="col-md-1 d-flex align-items-end mb-3">
                    <button type="submit" class="btn btn-primary w-100"
                            th:text="${todo.id != null} ? #{btn.update} : #{btn.add}">
                        Thêm
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<h4 th:text="#{todo.list.title}">Danh sách công việc</h4>

<table class="table table-striped table-hover">
    <thead class="table-dark">
    <tr>
        <th th:text="#{todo.id}">ID</th>
        <th th:text="#{todo.content}">Nội dung</th>
        <th th:text="#{todo.dueDate}">Ngày hết hạn</th>
        <th th:text="#{todo.status}">Trạng thái</th>
        <th th:text="#{todo.priority}">Ưu tiên</th>
        <th th:text="#{todo.actions}">Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todos}">
        <td th:text="${todo.id}"></td>
        <td th:text="${todo.content}"></td>
        <td th:text="${#temporals.format(todo.dueDate, 'dd/MM/yyyy')}"></td>
        <td>
            <span th:if="${todo.status == 'PENDING'}" class="badge bg-warning" th:text="#{status.pending}">Chưa làm</span>
            <span th:if="${todo.status == 'COMPLETED'}" class="badge bg-success" th:text="#{status.completed}">Hoàn thành</span>
        </td>
        <td th:text="${todo.priority}"></td>
        <td>
            <a th:href="@{/edit/{id}(id=${todo.id})}"
               class="btn btn-sm btn-warning action-btn"
               th:text="#{btn.edit}">Sửa</a>

            <a th:href="@{/delete/{id}(id=${todo.id})}"
               class="btn btn-sm btn-danger action-btn"
               onclick="return confirm([[#{btn.confirm.delete}]])"
               th:text="#{btn.delete}">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
