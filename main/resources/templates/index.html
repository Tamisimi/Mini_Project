<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Personal Todo App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        .error { color: red; font-size: 0.9em; }
        .table th { background-color: #f8f9fa; }
    </style>
</head>
<body class="container mt-5">

<h2 class="mb-4">Quản Lý Công Việc Cá Nhân</h2>

<!-- Form thêm mới -->
<div class="card mb-4">
    <div class="card-header">Thêm công việc mới</div>
    <div class="card-body">
        <form th:action="@{/add}" th:object="${todo}" method="post">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nội dung công việc</label>
                    <input type="text" class="form-control" th:field="*{content}" placeholder="Nhập nội dung...">
                    <div class="error" th:errors="*{content}"></div>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Ngày hết hạn</label>
                    <input type="date" class="form-control" th:field="*{dueDate}">
                    <div class="error" th:errors="*{dueDate}"></div>
                </div>

                <div class="col-md-2 mb-3">
                    <label class="form-label">Độ ưu tiên</label>
                    <select class="form-select" th:field="*{priority}">
                        <option value="LOW">Thấp</option>
                        <option value="MEDIUM">Trung bình</option>
                        <option value="HIGH">Cao</option>
                    </select>
                </div>

                <div class="col-md-1 d-flex align-items-end mb-3">
                    <button type="submit" class="btn btn-primary w-100">Thêm</button>
                </div>
            </div>
        </form>
    </div>
</div>

<h4>Danh sách công việc</h4>
<table class="table table-striped table-hover">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nội dung</th>
        <th>Ngày hết hạn</th>
        <th>Trạng thái</th>
        <th>Ưu tiên</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todos}">
        <td th:text="${todo.id}"></td>
        <td th:text="${todo.content}"></td>
        <td th:text="${#temporals.format(todo.dueDate, 'dd/MM/yyyy')}"></td>
        <td>
            <span th:if="${todo.status == 'PENDING'}" class="badge bg-warning">Chưa hoàn thành</span>
            <span th:if="${todo.status == 'COMPLETED'}" class="badge bg-success">Hoàn thành</span>
        </td>
        <td th:text="${todo.priority}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
